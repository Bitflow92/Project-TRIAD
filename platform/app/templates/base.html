<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project TRIAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/triad.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="brand">Project TRIAD</div>
        {% if current_user %}
        <nav>
            <a href="/">Home</a>
            <a href="/gym">Gym</a>
            <a href="/log">Log</a>
            {% if current_user == "Rynier" %}
            <a href="/admin">Admin</a>
            {% endif %}
            <span class="current-user-badge">{{ current_user }}</span>
            <a class="logout-link" href="/logout">Logout</a>
        </nav>
        {% endif %}
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        Project TRIAD • You can do it!
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
